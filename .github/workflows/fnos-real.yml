name: Build FnOS for ECB-PR51

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package FnOS for ECB-PR51
        uses: ophub/fnnas@main
        with:
          build_target: fnnas
          fnnas_path: https://github.com/ophub/fnnas/releases/download/fnnas_rockchip_692/fnnas_rockchip_leez_k6.12.41_2026.03.22.img.gz
          fnnas_board: rk3568
          auto_kernel: true
          kernel_repo: ophub/kernel
          kernel_usage: rk35xx
          builder_name: fnos-ecb-pr51

      - name: Add ECB-PR51 Device Tree
        if: ${{ env.PACKAGED_STATUS == 'success' }}
        run: |
          echo "Adding ECB-PR51 device tree to packaged image..."
          # Copy device tree to output
          mkdir -p ${{ env.PACKAGED_OUTPUTPATH }}/dtb
          cp .github/workflows/rk3568-ecb-pr51-final.dts ${{ env.PACKAGED_OUTPUTPATH }}/dtb/
          cp .github/workflows/rk3568-ecb-pr51.dts ${{ env.PACKAGED_OUTPUTPATH }}/dtb/
          ls -la ${{ env.PACKAGED_OUTPUTPATH }}/dtb/

      - name: Upload to Release
        if: ${{ env.PACKAGED_STATUS == 'success' }}
        uses: ncipollo/release-action@main
        with:
          tag: FnOS_ECB-PR51_${{ github.run_number }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
