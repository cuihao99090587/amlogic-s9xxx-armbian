name: Build FnOS for ECB-PR51

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone ophub Repository
        run: |
          git clone --depth 1 https://github.com/ophub/amlogic-s9xxx-armbian.git /tmp/ophub
          cd /tmp/ophub
          ls -la

      - name: Add ECB-PR51 Device Tree
        run: |
          echo "Adding ECB-PR51 device tree..."
          cp .github/workflows/rk3568-ecb-pr51-final.dts /tmp/ophub/build-armbian/armbian-files/platform-files/rockchip/bootfs/dtb/rockchip/
          cp .github/workflows/rk3568-ecb-pr51.dts /tmp/ophub/build-armbian/armbian-files/platform-files/rockchip/bootfs/dtb/rockchip/
          ls -la /tmp/ophub/build-armbian/armbian-files/platform-files/rockchip/bootfs/dtb/rockchip/ | grep ecb

      - name: Add ECB-PR51 to Database
        run: |
          echo "Adding ECB-PR51 to model database..."
          # Format based on ophub examples:
          # ID MODEL SOC FDTFILE UBOOT_OVERLOAD MAINLINE_UBOOT BOOTLOADER_IMG DESCRIPTION KERNEL_TAGS PLATFORM FAMILY BOOT_CONF CONTRIBUTORS BOARD BUILD
          # Note: KERNEL_TAGS format is "rk35xx/6.1.y" NOT "kernel_rk35xx/6.1.y"
          echo 'r999    :Lenovo-ECB-PR51                             :rk3568   :rk3568-ecb-pr51.dtb                    :NA                           :u-boot.itb                          :idbloader.img                   :8GB-DDR4,32GB-eMMC,2x1Gb-Nic,3xSATA,2xUSB3.0 :rk35xx/6.1.y          :rockchip    :rk3568       :armbianEnv.txt  :cuihao99090587                                      :rk3568-ecb-pr51     :yes' >> /tmp/ophub/build-armbian/armbian-files/common-files/etc/model_database.conf
          echo "Added ECB-PR51 entry:"
          tail -3 /tmp/ophub/build-armbian/armbian-files/common-files/etc/model_database.conf

      - name: Download and Rename Armbian Image
        run: |
          mkdir -p /tmp/ophub/build/output/images
          wget -q --show-progress \
            "https://github.com/ophub/amlogic-s9xxx-armbian/releases/download/Armbian_trixie_arm64_server_2026.04/Armbian_26.02.0_rockchip_leez_trixie_6.12.79_server_2026.04.01.img.gz" \
            -O /tmp/ophub/build/output/images/temp.img.gz
          cd /tmp/ophub/build/output/images
          gunzip -f temp.img.gz
          # Rename to include -trunk_ as required by ophub
          mv temp.img Armbian_26.02.0-trunk_rockchip_leez_trixie_6.12.79_server_2026.04.01.img
          ls -lh

      - name: Package Armbian for ECB-PR51
        run: |
          cd /tmp/ophub
          echo "Starting rebuild..."
          sudo ./rebuild -b rk3568-ecb-pr51 -k 6.12.y -a true -n fnos-ecb-pr51

      - name: Upload to Release
        if: success()
        uses: ncipollo/release-action@main
        with:
          tag: FnOS_ECB-PR51_${{ github.run_number }}
          artifacts: /tmp/ophub/build/output/images/*.img.gz
          allowUpdates: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
